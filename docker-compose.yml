# MySQL local para desarrollo.
# En producción se usará un MySQL gestionado o un contenedor equivalente.
services:
  mysql:
    image: mysql:8.4
    container_name: pocketcv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pocketcv}
      MYSQL_USER: ${MYSQL_USER:-pocketcv}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pocketcvpass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
